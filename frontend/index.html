<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Tarefas - PBL</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>🎯 TaskMaster</h1>
        <p>Gerencie seus prazos e prioridades em um só lugar</p>
    </header>

    <main>
        <section id="cadastro-tarefa">
            <h2>Nova Tarefa</h2>
            <form id="form-tarefa">
                <div class="form-group">
                    <label for="titulo">Título da Tarefa:</label>
                    <input type="text" id="titulo" name="titulo" placeholder="Ex: Estudar para a prova de Redes" required>
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição:</label>
                    <textarea id="descricao" name="descricao" placeholder="Detalhes sobre a tarefa..."></textarea>
                </div>

                <div class="form-group">
                    <label for="prazo">Prazo de Entrega:</label>
                    <input type="date" id="prazo" name="prazo" required>
                </div>

                <div class="form-group">
                    <label for="categoria">Categoria:</label>
                    <select id="categoria" name="categoria">
                        <option value="trabalho">Trabalho</option>
                        <option value="estudos">Estudos</option>
                        <option value="pessoal">Pessoal</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="prioridade">Prioridade:</label>
                    <select id="prioridade" name="prioridade">
                        <option value="baixa">Baixa</option>
                        <option value="média">Média</option>
                        <option value="alta">Alta</option>
                    </select>
                </div>

                <button type="submit">Adicionar Tarefa</button>
            </form>
        </section>

        <section id="listagem-tarefas">
            <div style="text-align: right; margin-bottom: 15px;">
                <button id="btn-docente" style="background-color: #6f42c1; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;">
                    👨‍🏫 Ver Dados do Professor
                </button>
            </div>

            <h2>Suas Tarefas</h2>

            <div id="filtros-container">
                <label for="filtro-status">Filtrar por Status:</label>
                <select id="filtro-status">
                    <option value="todas">Todas</option>
                    <option value="pendentes">Pendentes</option>
                    <option value="concluidas">Concluídas</option>
                </select>
            </div>

            <ul id="lista-tarefas">
            </ul>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Desenvolvido na disciplina de Desenvolvimento de Sistemas.</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
